<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2d95"/>
      <stop offset="100%" stop-color="#7b2dff"/>
    </linearGradient>
  </defs>
  <!-- outer disc -->
  <circle cx="32" cy="32" r="32" fill="url(#g)"/>
  <!-- groove ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="17" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
  <!-- label area -->
  <circle cx="32" cy="32" r="12" fill="#0c0b0e" opacity="0.7"/>
  <!-- centre hole -->
